{% extends "base.html" %} {% block title %} Animal {{animal.id}} by name
{{animal.name}}{% endblock %} {% block my_content %}

<table class="table table-dark table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Species</th>
      <th>Age</th>
      <th>Health</th>
      <th>Enclosures</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>{{ animal.name}}</td>
      <td>{{ animal.species}}</td>
      <td>{{ animal.age}}</td>
      <td>{{ animal.health}}</td>
      <td>{{ animal.enclosure_id}}</td>
    </tr>
  </tbody>
</table>
{% endblock %}
